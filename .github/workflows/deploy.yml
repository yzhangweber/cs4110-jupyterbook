name: deploy-book

on:
  push:
    branches:
      - main

# Prevent overlapping deployments if two pushes happen in quick succession
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "jupyter-book<2"
          pip install sphinx-last-updated-by-git
          pip install sphinxcontrib-mermaid
          pip install sphinx-book-theme

      - name: Build the book
        run: |
          jupyter-book build . 2>&1 | tee build.log
          if [ ! -d "_build/html" ]; then
            echo "Build failed - _build/html not found"
            cat build.log
            exit 1
          fi

      # Confirms _static/ files made it into the build output.
      # If either line prints "NOT FOUND", check that _static/ exists
      # at the repo root and is committed (not in .gitignore).
      - name: Verify a11y static files were included
        run: |
          if [ -f "_build/html/_static/a11y-fixes.css" ]; then
            echo "✓ a11y-fixes.css found in build output"
          else
            echo "NOT FOUND: a11y-fixes.css — check _static/ is committed at repo root"
          fi
          if [ -f "_build/html/_static/a11y-fixes.js" ]; then
            echo "✓ a11y-fixes.js found in build output"
          else
            echo "NOT FOUND: a11y-fixes.js — check _static/ is committed at repo root"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
